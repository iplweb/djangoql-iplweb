name: Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Minimal default token scope; tests only need to read the repo.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231 # v5.3.1
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --all-extras
      # Lint is informational only (|| true): the codebase is intentionally
      # not bulk-formatted; enforcement happens in pre-commit on staged files.
      - name: Lint with ruff
        run: uv run ruff check . || true
      - name: Check formatting with ruff
        run: uv run ruff format --check . || true

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python = ">=3.10"; only currently-supported Django series.
        # Django 5.2 LTS: Python 3.10-3.14; Django 6.0: Python 3.12-3.14.
        include:
          - {python-version: '3.10', django-version: '5.2'}
          - {python-version: '3.11', django-version: '5.2'}
          - {python-version: '3.12', django-version: '5.2'}
          - {python-version: '3.13', django-version: '5.2'}
          - {python-version: '3.14', django-version: '5.2'}
          - {python-version: '3.12', django-version: '6.0'}
          - {python-version: '3.13', django-version: '6.0'}
          - {python-version: '3.14', django-version: '6.0'}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231 # v5.3.1
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies (project + Django ${{ matrix.django-version }})
        run: |
          uv sync --all-extras
          uv pip install "django~=${{ matrix.django-version }}.0"
      - name: Compile translation catalogs (Babel)
        # .mo files are not tracked in git; compile them with the same Babel
        # function the build backend uses (no system gettext needed).
        run: uv run --no-sync python -c "from _translations import compile_catalogs; compile_catalogs()"
      - name: Run tests
        # --no-sync so the matrix-pinned Django above is not reverted by uv.
        run: uv run --no-sync pytest

  tests-postgres:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231 # v5.3.1
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies (project + Django 5.2)
        run: |
          uv sync --all-extras
          uv pip install "django~=5.2.0"
      - name: Compile translation catalogs (Babel)
        # .mo files are not tracked in git; compile them with the same Babel
        # function the build backend uses (no system gettext needed).
        run: uv run --no-sync python -c "from _translations import compile_catalogs; compile_catalogs()"
      - name: Run tests (PostgreSQL via testcontainers)
        # --no-sync so the pinned Django above is not reverted by uv.
        # Testcontainers manages the postgres:16-alpine container itself;
        # no services: block needed — the runner's Docker daemon is used.
        env:
          DJANGOQL_TEST_DB: postgres
        run: uv run --no-sync pytest
