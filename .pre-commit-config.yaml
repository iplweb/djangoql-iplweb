# Pre-commit runs on STAGED files only — changed files get linted before
# they land, the rest of the repo is untouched.
#
# Install:  uv sync --all-extras && pre-commit install
# Manual:   pre-commit run                  # staged files only
#           pre-commit run --all-files      # everything (escape hatch)
#
# Ruff replaces the previous flake8 + isort stack. The enforced rules are
# mirrored in pyproject.toml [tool.ruff] (E/F/W + flake8-quotes Q +
# flake8-print T20 + flake8-builtins A + isort I), so lint coverage is
# preserved. pyupgrade / django-upgrade modernize syntax, but only on the
# files you actually stage — never run them across the whole repo.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py310-plus]  # floor from requires-python = ">=3.10"

  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.30.0
    hooks:
      - id: django-upgrade
        args: [--target-version, "4.2"]  # floor from the supported Django range

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
